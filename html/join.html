        this.closeForumMenus();
      },
      closeForumMenus(){
        this.forumFollowMenuOpen = false;
        this.forumMoreMenuOpen = false;
        this.activeForumPostMenuId = null;
      },
      openForumPostModal(){
        this.closeForumMenus();
        this.showPostModal = true;
      },
      refreshMyForumPosts(){
        this.closeForumMenus();
        this.loadMyPosts();
      },
      handleForumFollowClick(){
        this.forumMoreMenuOpen = false;
        if(!this.isFollowingMyForumProfile){
          this.forumSelfFollowed = true;
          return;
        }
        this.forumFollowMenuOpen = !this.forumFollowMenuOpen;
      },
      notifyForumFollowAction(text){
        this.forumFollowMenuOpen = false;
        alert(text);
      },
      unfollowMyForumProfile(){
        this.forumSelfFollowed = false;
        this.forumFollowMenuOpen = false;
      },
      toggleForumMoreMenu(){
        this.forumFollowMenuOpen = false;
        this.activeForumPostMenuId = null;
        this.forumMoreMenuOpen = !this.forumMoreMenuOpen;
      },
      toggleForumPostMenu(id){
        const postId = this.normalizeForumId(id);
        if(!postId) return;
        this.forumFollowMenuOpen = false;
        this.forumMoreMenuOpen = false;
        this.activeForumPostMenuId = this.activeForumPostMenuId === postId ? null : postId;
      },
      openForumHome(){
        this.closeForumMenus();
        window.location.href = 'spjs.html';
      },
      shareMyForumHome(){
        const url = location.href.split('#')[0];
        this.closeForumMenus();
        if(navigator && navigator.clipboard && typeof navigator.clipboard.writeText === 'function'){
          navigator.clipboard.writeText(url).then(() => {
            alert('Profile link copied.');
          }).catch(() => {
            alert('Please copy the current page link manually.');
          });
          return;
        }
        alert('Please copy the current page link manually.');
      },
      isForumVideoPost(post){
        const channel = String((post && post.channel) || '').trim();
        return channel === 'Videos' || channel === 'Video' || !!String((post && post.videoUrl) || '').trim();
      },
      sortForumPosts(list, compareFn){
        return (Array.isArray(list) ? list.slice() : []).sort((a, b) => {
          const pinDiff = Number(!!(b && b.pinned)) - Number(!!(a && a.pinned));
          if(pinDiff !== 0) return pinDiff;
          if(typeof compareFn === 'function') return compareFn(a, b);
          const ta = this.forumPostSortValue(a);
          const tb = this.forumPostSortValue(b);
          return tb - ta;
        });
      },
      forumCommentTreeCount(nodes){
        if(!Array.isArray(nodes)) return 0;
        return nodes.reduce((sum, node) => {
          if(!node) return sum;
          return sum + 1 + this.forumCommentTreeCount(node.replies);
        }, 0);
      },
      forumCommentCount(post){
        return this.forumCommentTreeCount(post && post.comments);
      },
      forumFlattenCommentTree(nodes, depth){
        const list = [];
        const level = Number(depth) || 0;
        if(!Array.isArray(nodes)) return list;
        nodes.forEach(node => {
          if(!node) return;
          list.push({ node: node, depth: level });
          list.push(...this.forumFlattenCommentTree(node.replies, level + 1));
        });
        return list;
      },
      forumCommentRows(post){
        return this.forumFlattenCommentTree(post && post.comments ? post.comments : [], 0);
      },
      forumCommentIndentStyle(depth){
        if(!(Number(depth) > 0)) return null;
        return {
          marginLeft: (Number(depth) * 18) + 'px'
        };
      },
      forumCommentAuthorName(comment){
        return String((comment && comment.author) || '').trim() || 'Anonymous User';
      },
      forumPostPreviewText(post, limit){
        const max = Number(limit) || 18;
        const source = String((post && (post.title || post.content)) || '').replace(/\s+/g, ' ').trim();
        if(!source) return 'No content';
        return source.length > max ? (source.slice(0, max) + '...') : source;
      },
      forumPostAuthorName(post){
        const author = String((post && post.author) || '').trim();
        return author || this.forumProfileName;
      },
      forumPostAvatarSrc(post){
        if(this.isCurrentForumOwnedPost(post)) return this.profileAvatarSrc;
        const avatar = String((post && post.avatarUrl) || '').trim();
        return avatar;
      },
      forumPostVisibilityText(post){
        const visibility = String((post && post.visibility) || 'public').trim() || 'public';
        if(visibility === 'followers') return 'Followers Only';
        if(visibility === 'friends') return 'Friends Only';
        if(visibility === 'private') return 'Private';
        return 'Public';
      },
      shareMyForumPost(post){
        const text = this.forumPostPreviewText(post, 40);
        const lines = [this.forumPostAuthorName(post), text, String((post && post.time) || '')].filter(Boolean);
        const payload = lines.join('\n');
        const fallback = () => {
          alert('Prepared content for sharing:\n' + payload);
        };
        this.closeForumMenus();
        if(navigator && navigator.clipboard && typeof navigator.clipboard.writeText === 'function'){
          navigator.clipboard.writeText(payload).then(() => {
            alert('Shared content copied');
          }).catch(() => {
            fallback();
          });
          return;
        }
        fallback();
      },
      updateForumPost(postId, updater){
        const targetId = this.normalizeForumId(postId);
        if(!targetId || typeof updater !== 'function') return;
        let all = [];
        try{
          all = JSON.parse(localStorage.getItem('spjs_forum_posts_v1') || '[]');
        }catch(e){
          all = [];
        }
        const next = all.map(item => {
          if(this.normalizeForumId(item && item.id) !== targetId) return item;
          const cloned = Object.assign({}, item);
          updater(cloned);
          return cloned;
        });
        localStorage.setItem('spjs_forum_posts_v1', JSON.stringify(next));
        this.loadMyPosts();
      },
      async likeForumPost(post){
        if(!post) return;
        const service = this.getForumService();
        if(post.source === 'supabase' && this.hasSupabaseForumConfigured() && service){
          try{
            post.likes = await service.likePost(post.id);
            return;
          }catch(e){
            alert(service.mapForumActionError(e));
            return;
          }
        }
        this.updateForumPost(post.id, item => {
          item.likes = (Number(item.likes) || 0) + 1;
        });
      },
      openForumMessageComposer(){
        if(!this.myForumLatestPost) return;
        this.openForumCommentComposer(this.myForumLatestPost);
      },
      async openForumCommentComposer(post){
        if(!post) return;
        const text = prompt('Enter your message');
        const content = String(text || '').trim();
        if(!content) return;
        const service = this.getForumService();
        if(post.source === 'supabase' && this.hasSupabaseForumConfigured() && this.sessionUserId && service){
          try{
            const created = await service.createComment(post.id, null, content, '', this.sessionUserId, this.sessionEmail);
            post.comments = Array.isArray(post.comments) ? post.comments : [];
            post.comments.unshift(created);
            return;
          }catch(e){
            alert(service.mapForumActionError(e));
            return;
          }
        }
        this.updateForumPost(post.id, item => {
          item.comments = Array.isArray(item.comments) ? item.comments.slice() : [];
          item.comments.unshift({
            id: String(Date.now()),
            author: this.forumProfileName || 'User',
            ownerEmail: this.sessionEmail || '',
            text: content,
            time: new Date().toLocaleString(),
            createdTs: Date.now(),
            likes: 0,
            replies: []
          });
        });
      },

      loadMyPosts(){
         const service = this.getForumService();
         if(this.hasSupabaseForumConfigured() && this.sessionUserId && service){
           service.fetchMyPosts(this.sessionUserId, this.sessionEmail)
             .then((rows) => {
               this.myPosts = this.mergeMyForumPosts(rows, this.isBusinessLocalCacheDisabled() ? [] : []);
               this.closeForumMenus();
             })
             .catch(() => {
               this.myPosts = this.isBusinessLocalCacheDisabled() ? [] : this.loadLocalMyPosts();
               this.closeForumMenus();
             });
           return;
         }
         this.myPosts = this.isBusinessLocalCacheDisabled() ? [] : this.loadLocalMyPosts();
         this.closeForumMenus();
      },
      async createPost(){
         const content = String(this.newPost.content || '').trim();
         const imageUrls = Array.isArray(this.newPost.imageUrls) ? this.newPost.imageUrls.slice() : [];
         const videoUrl = String(this.newPost.videoUploadUrl || '').trim();
         if(!content && imageUrls.length === 0 && !videoUrl){
           alert('Enter content or upload an image or video.'); return;
         }
         const title = this.buildForumPostTitle(content, imageUrls, videoUrl);
         const club = String(this.newPost.club || '').trim() || this.defaultForumPostClub();
         const type = String(this.newPost.type || '').trim() || 'Tips & Experience';
         const post = {
           id: String(Date.now()),
           title,
           type,
           club,
           content,
           author: this.forumProfileName || 'User',
           ownerEmail: this.sessionEmail,
           time: new Date().toLocaleString(),
           createdTs: Date.now(),
           channel: videoUrl ? 'Videos' : 'Community',
           visibility: 'public',
           pinned: false,
           avatarUrl: this.profile.avatar || '',
           imageUrls,
           videoUrl,
           videoName: String(this.newPost.videoUploadName || '').trim(),
           likes: 0,
           comments: []
         };
         const service = this.getForumService();
         if(this.hasSupabaseForumConfigured() && this.sessionUserId && service){
           try{
             await service.createPost(post, this.sessionUserId, this.sessionEmail);
           }catch(e){
             alert(service.mapForumActionError(e));
             return;
           }
         }else{
           const all = JSON.parse(localStorage.getItem('spjs_forum_posts_v1') || '[]');
           all.unshift(post);
           localStorage.setItem('spjs_forum_posts_v1', JSON.stringify(all));
         }
         this.showPostModal = false;
         this.resetForumPostComposer();
         this.forumTab = 'Posts';
         this.loadMyPosts();
         alert('Published successfully.');
      },
      async deletePost(id){
         const postId = this.normalizeForumId(id);
         if(!postId) return;
         if(confirm('Delete this post?')){
           const target = (this.myPosts || []).find(p => this.normalizeForumId(p && p.id) === postId) || null;
           const service = this.getForumService();
           if(target && target.source === 'supabase' && this.hasSupabaseForumConfigured() && service){
             try{
               await service.deletePost(postId);
             }catch(e){
               alert(service.mapForumActionError(e));
               return;
             }
           }else{
             let all = JSON.parse(localStorage.getItem('spjs_forum_posts_v1') || '[]');
             all = all.filter(p => this.normalizeForumId(p && p.id) !== postId);
             localStorage.setItem('spjs_forum_posts_v1', JSON.stringify(all));
           }
           this.loadMyPosts();
         }
      },

      loadMyFavs(){
         const service = this.getCourseService();
         if(this.hasSupabaseCoursesConfigured() && this.sessionUserId && service){
           service.fetchMyFavorites(this.sessionUserId, this.sessionEmail)
             .then((rows) => {
               const fallback = this.isBusinessLocalCacheDisabled() ? [] : this.loadLocalFavoriteCourses();
               this.myFavs = this.mergeFavoriteCourses(rows, fallback);
             })
             .catch(() => {
               this.myFavs = this.isBusinessLocalCacheDisabled() ? [] : this.loadLocalFavoriteCourses();
             });
           return;
         }
         this.myFavs = this.isBusinessLocalCacheDisabled() ? [] : this.loadLocalFavoriteCourses();
      },
      removeFav(courseId){
         if(confirm('Remove this favorite?')){
           const service = this.getCourseService();
           if(this.hasSupabaseCoursesConfigured() && this.sessionUserId && service){
             service.removeFavorite(this.sessionUserId, courseId)
               .then(() => {
                 this.removeFavoriteLocalCache(courseId);
                 this.loadMyFavs();
               })
               .catch(() => {
                 alert('Unable to remove this favorite in Supabase right now. Please try again.');
               });
             return;
           }
           let all = JSON.parse(localStorage.getItem('mfms_fav_courses_v1') || '[]');
           all = all.filter(f => !(f.ownerEmail === this.sessionEmail && String(f.courseId) === String(courseId)));
           localStorage.setItem('mfms_fav_courses_v1', JSON.stringify(all));
           
           const favKey = 'mfms_favs_v1:' + (this.sessionEmail || 'guest');
           let ids = JSON.parse(localStorage.getItem(favKey) || '[]');
           ids = ids.filter(x => String(x) !== String(courseId));
           localStorage.setItem(favKey, JSON.stringify(ids));
           
           this.loadMyFavs();
         }
      },
      formatTime(t){ return t ? t.split('T')[0] : ''; },
      parseTimeText(text){
        const ts = Date.parse(text || '');
        return Number.isNaN(ts) ? 0 : ts;
      }
    }
  })
</script>
<script src="../js/chat-widget.js"></script>
